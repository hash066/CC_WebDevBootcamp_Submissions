<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Amit's To-Do App</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>

  :root {
    --bg: #0f0c1a;
    --card: #1a1530;
    --accent: #c084fc;
    --accent2: #818cf8;
    --danger: #f43f5e;
    --done: #34d399;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --border: rgba(192,132,252,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 16px 60px;
    color: var(--text);
    background-image:
      radial-gradient(ellipse 60% 50% at 70% -10%, rgba(129,140,248,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 10% 90%, rgba(192,132,252,0.12) 0%, transparent 70%);
  }

  .wrapper {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Profile Card */
  .profile-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px 24px 20px;
    display: flex;
    align-items: center;
    gap: 18px;
    position: relative;
    overflow: hidden;
  }

  .profile-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 130px; height: 130px;
    background: radial-gradient(circle, rgba(192,132,252,0.25), transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }

  .avatar-wrap { position: relative; flex-shrink: 0; }

  .avatar {
    width: 68px; height: 68px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c084fc, #818cf8);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 26px; font-weight: 800;
    color: #fff;
    box-shadow: 0 0 0 3px rgba(192,132,252,0.3), 0 8px 24px rgba(192,132,252,0.2);
    user-select: none;
  }

  .status-dot {
    position: absolute; bottom: 3px; right: 3px;
    width: 14px; height: 14px;
    background: var(--done); border-radius: 50%;
    border: 2px solid var(--card);
    box-shadow: 0 0 6px var(--done);
  }

  .profile-info h1 {
    font-family: 'Syne', sans-serif;
    font-size: 18px; font-weight: 700; line-height: 1.2;
  }

  .profile-info .role {
    font-size: 12px; font-weight: 500;
    color: var(--accent); letter-spacing: 0.06em;
    text-transform: uppercase; margin-top: 2px;
  }

  .profile-info .bio {
    font-size: 13px; color: var(--muted);
    margin-top: 6px; line-height: 1.5;
  }

  /* Todo Card */
  .todo-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px;
  }

  .todo-header {
    font-family: 'Syne', sans-serif;
    font-size: 22px; font-weight: 800;
    margin-bottom: 18px;
    display: flex; align-items: center; gap: 10px;
  }

  .todo-header span {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .count-badge {
    background: rgba(192,132,252,0.15);
    border: 1px solid var(--border);
    color: var(--accent);
    font-size: 12px; font-weight: 600;
    padding: 2px 10px; border-radius: 99px;
    font-family: 'DM Sans', sans-serif;
    margin-left: auto;
  }

  /* Input Row */
  .input-row { display: flex; gap: 10px; margin-bottom: 18px; }

  .input-row input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 11px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-row input::placeholder { color: var(--muted); }

  .input-row input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(192,132,252,0.12);
  }

  .add-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border: none;
    padding: 11px 20px; border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 700;
    cursor: pointer; white-space: nowrap;
    transition: opacity 0.2s, transform 0.15s;
  }

  .add-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .add-btn:active { transform: scale(0.97); }

  /* Task List */
  #taskList { list-style: none; display: flex; flex-direction: column; gap: 10px; }

  #taskList li {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    transition: background 0.2s;
    animation: slideIn 0.22s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #taskList li:hover { background: rgba(255,255,255,0.07); }

  .task-check {
    width: 20px; height: 20px;
    border-radius: 6px;
    border: 2px solid rgba(192,132,252,0.4);
    flex-shrink: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, border-color 0.2s;
  }

  .task-check.done { background: var(--done); border-color: var(--done); }
  .task-check.done::after { content: '✓'; font-size: 12px; color: #fff; font-weight: 700; }

  .task-text {
    flex: 1; font-size: 14px; color: var(--text);
    cursor: pointer; line-height: 1.4;
  }

  .task-text.completed { text-decoration: line-through; color: var(--muted); }

  .del-btn {
    background: rgba(244,63,94,0.12);
    border: 1px solid rgba(244,63,94,0.2);
    color: var(--danger);
    width: 30px; height: 30px;
    border-radius: 8px; cursor: pointer;
    font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.15s;
    flex-shrink: 0;
  }

  .del-btn:hover { background: rgba(244,63,94,0.28); transform: scale(1.1); }

  .empty-state {
    text-align: center; padding: 24px 0 8px;
    color: var(--muted); font-size: 14px;
  }

  .empty-state .icon { font-size: 32px; display: block; margin-bottom: 8px; }

</style>
</head>
<body>

<div class="wrapper">

  <!-- Profile Card -->
  <div class="profile-card">
    <div class="avatar-wrap">
      <div class="avatar">A</div>
      <div class="status-dot"></div>
    </div>
    <div class="profile-info">
      <h1>Amit</h1>
      <div class="role">Full-Stack Developer</div>
      <p class="bio">Building clean web apps with Node.js &amp; vanilla JS. This is my personal task tracker to stay productive every day.</p>
    </div>
  </div>

  <!-- Todo Card -->
  <div class="todo-card">
    <div class="todo-header">
      <span>My Tasks</span>
      <div class="count-badge" id="countBadge">0 tasks</div>
    </div>

    <div class="input-row">
      <input id="taskInput" placeholder="What needs to be done?" autocomplete="off">
      <button class="add-btn" id="addBtn">+ Add</button>
    </div>

    <ul id="taskList"></ul>
  </div>

</div>

<script>
  // ── localStorage helpers ──────────────────────────────
  function getTasks() {
    try { return JSON.parse(localStorage.getItem('amit_tasks') || '[]'); }
    catch(e) { return []; }
  }

  function saveTasks(tasks) {
    localStorage.setItem('amit_tasks', JSON.stringify(tasks));
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  // ── Render list ───────────────────────────────────────
  function render() {
    const tasks = getTasks();
    const list  = document.getElementById('taskList');
    const badge = document.getElementById('countBadge');

    badge.textContent = tasks.length + (tasks.length === 1 ? ' task' : ' tasks');
    list.innerHTML = '';

    if (tasks.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <span class="icon">✅</span>
          All clear! Add a task above to get started.
        </div>`;
      return;
    }

    tasks.forEach(function(task) {
      var li = document.createElement('li');

      var check = document.createElement('div');
      check.className = 'task-check' + (task.completed ? ' done' : '');
      check.addEventListener('click', function() { toggleTask(task.id); });

      var span = document.createElement('span');
      span.className = 'task-text' + (task.completed ? ' completed' : '');
      span.textContent = task.text;
      span.addEventListener('click', function() { toggleTask(task.id); });

      var del = document.createElement('button');
      del.className = 'del-btn';
      del.textContent = '✕';
      del.title = 'Delete';
      del.addEventListener('click', function() { deleteTask(task.id); });

      li.appendChild(check);
      li.appendChild(span);
      li.appendChild(del);
      list.appendChild(li);
    });
  }

  // ── CRUD actions ──────────────────────────────────────
  function addTask() {
    var input = document.getElementById('taskInput');
    var text  = input.value.trim();
    if (!text) { input.focus(); return; }

    var tasks = getTasks();
    tasks.push({ id: uid(), text: text, completed: false });
    saveTasks(tasks);
    input.value = '';
    input.focus();
    render();
  }

  function deleteTask(id) {
    saveTasks(getTasks().filter(function(t) { return t.id !== id; }));
    render();
  }

  function toggleTask(id) {
    var tasks = getTasks();
    tasks.forEach(function(t) {
      if (t.id === id) t.completed = !t.completed;
    });
    saveTasks(tasks);
    render();
  }

  // ── Events ────────────────────────────────────────────
  document.getElementById('addBtn').addEventListener('click', addTask);
  document.getElementById('taskInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addTask();
  });

  render();
</script>

</body>
</html>
